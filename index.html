<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />

    <!-- FULLSCREEN META -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <title>Bank App</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        touch-action: manipulation;
        font-family: sans-serif;
      }

      .screen {
        width: 100vw;
        height: 100vh;
        position: relative;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      .screen img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .click-area {
        position: absolute;
        cursor: pointer;
      }

      .btn-transfer {
        top: 36%;
        left: 5%;
        width: 25%;
        height: 10%;
      }

      .btn-payment {
        top: 36%;
        left: 37%;
        width: 25%;
        height: 10%;
      }

      .btn-history {
        top: 36%;
        right: 5%;
        width: 25%;
        height: 10%;
      }

      .card-area {
        top: 50%;
        left: 3%;
        width: 94%;
        height: 12%;
      }

      .click-area:active {
        background: rgba(255, 255, 255, 0.08);
      }

      #balance {
        position: absolute;
        top: 53.5%;
        left: 24.5%;
        color: rgb(35, 34, 34);
        font-size: 18px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="screen">
      <img src="bank.png" alt="Bank App" />

      <!-- BALANS -->
      <div id="balance"></div>

      <div class="click-area btn-transfer" onclick="goPage('2.html')"></div>
      <div class="click-area btn-payment" onclick="goPage('payment.html')"></div>
      <div class="click-area btn-history" onclick="goPage('history.html')"></div>
      <div class="click-area card-area" onclick="goPage('2.html')"></div>
    </div>

    <script>
      const API_URL = "https://8e02283d-6dab-4cbf-93db-16181ed3b0aa-00-297hqfhjj5j3a.kirk.replit.dev";

      function goPage(page) {
        if (navigator.vibrate) navigator.vibrate(10);
        window.location.href = page;
      }

      document.addEventListener("touchmove", function(e) {
        e.preventDefault();
      }, { passive: false });

      async function init() {
        const code = localStorage.getItem("basparo_code");

        if (!code) {
          window.location.href = "login.html";
          return;
        }

        // Köhnə balansı silirik
        localStorage.removeItem("basparo_balance");

        try {
          const res = await fetch(API_URL + "/api/users/me", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code })
          });

          if (res.status === 404) {
            localStorage.clear();
            window.location.href = "login.html";
            return;
          }

          const data = await res.json();
          const bal = Number(data.balance) || 0;

          // Yeni balansı saxlayırıq və göstəririk
          localStorage.setItem("basparo_balance", String(bal));
          document.getElementById("balance").innerText = bal.toFixed(2) + " ₼";
        } catch(e) {
          // API işləmirsə fallback: heç bir köhnə balans göstərmir
          document.getElementById("balance").innerText = "--- ₼";
        }
      }

      window.addEventListener("load", init);
    </script>
  </body>
</html>
